name: Release Alfred Workflow

on:
  push:
    tags:
      - 'v*' # Trigger on version tags
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    name: Build and Release
    runs-on: macos-latest
    permissions:
      contents: write # Needed to create a GitHub Release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, aarch64-apple-darwin

      - name: Build for macOS (Intel)
        run: cargo build --release --target x86_64-apple-darwin

      - name: Build for macOS (Apple Silicon)
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create Universal Binary
        run: |
          lipo -create -output ub target/x86_64-apple-darwin/release/ub target/aarch64-apple-darwin/release/ub

      - name: Package Alfred Workflow
        run: |
          mkdir -p package
          cp ub package/
          cp info.plist package/

          # Add icon if it exists
          if [ -f "icon.png" ]; then
            cp icon.png package/
          fi

          cd package
          zip -r ../UniversalBookmarks.alfredworkflow .

      - name: Upload Workflow Artifact
        uses: actions/upload-artifact@v6
        with:
          name: UniversalBookmarks.alfredworkflow
          path: UniversalBookmarks.alfredworkflow

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: UniversalBookmarks.alfredworkflow
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
