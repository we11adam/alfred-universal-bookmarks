name: Release Alfred Workflow

on:
  push:
    tags:
      - "v*" # Trigger on version tags
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    name: Build and Release
    runs-on: macos-latest
    permissions:
      contents: write # Needed to create a GitHub Release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, aarch64-apple-darwin

      - name: Build for macOS (Intel)
        run: cargo build --release --target x86_64-apple-darwin

      - name: Build for macOS (Apple Silicon)
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create Universal Binary
        run: |
          lipo -create -output ub target/x86_64-apple-darwin/release/ub target/aarch64-apple-darwin/release/ub

      - name: Extract Version
        id: extract_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=$(echo "${{ github.sha }}" | cut -c1-7)
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Package Alfred Workflows
        run: |
          mkdir -p package-universal package-amd64 package-arm64

          # Copy common files
          cp info.plist package-universal/
          cp info.plist package-amd64/
          cp info.plist package-arm64/

          if [ -f "icon.png" ]; then
            cp icon.png package-universal/
            cp icon.png package-amd64/
            cp icon.png package-arm64/
          fi

          # Copy updater script
          cp updater.sh package-universal/
          cp updater.sh package-amd64/
          cp updater.sh package-arm64/

          # Universal
          cp ub package-universal/
          cd package-universal
          zip -r ../UniversalBookmarks-${{ env.VERSION }}-universal.alfredworkflow .
          cd ..

          # AMD64
          cp target/x86_64-apple-darwin/release/ub package-amd64/ub
          cd package-amd64
          zip -r ../UniversalBookmarks-${{ env.VERSION }}-amd64.alfredworkflow .
          cd ..

          # ARM64
          cp target/aarch64-apple-darwin/release/ub package-arm64/ub
          cd package-arm64
          zip -r ../UniversalBookmarks-${{ env.VERSION }}-arm64.alfredworkflow .
          cd ..

      - name: Upload Universal Workflow
        uses: actions/upload-artifact@v6
        with:
          name: UniversalBookmarks-${{ env.VERSION }}-universal.alfredworkflow
          path: UniversalBookmarks-${{ env.VERSION }}-universal.alfredworkflow

      - name: Upload AMD64 Workflow
        uses: actions/upload-artifact@v6
        with:
          name: UniversalBookmarks-${{ env.VERSION }}-amd64.alfredworkflow
          path: UniversalBookmarks-${{ env.VERSION }}-amd64.alfredworkflow

      - name: Upload ARM64 Workflow
        uses: actions/upload-artifact@v6
        with:
          name: UniversalBookmarks-${{ env.VERSION }}-arm64.alfredworkflow
          path: UniversalBookmarks-${{ env.VERSION }}-arm64.alfredworkflow

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: UniversalBookmarks-*.alfredworkflow
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
